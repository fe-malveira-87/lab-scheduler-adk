services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    env_file: .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - lab-network

  ocr-mcp:
    build:
      context: .
      dockerfile: docker/Dockerfile.ocr
    ports:
      - "8001:8001"
    env_file: .env
    depends_on:
      api:
        condition: service_healthy
    networks:
      - lab-network

  rag-mcp:
    build:
      context: .
      dockerfile: docker/Dockerfile.rag
    ports:
      - "8002:8002"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - lab-network

networks:
  lab-network:
    driver: bridge
